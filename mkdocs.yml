site_name: Enforcer Custom Mission Loader
site_url: https://blabla.com/
theme:
  name: material
  font:
    text: Noto Sans Mono
  icon:
    logo: material/police-badge-outline
  favicon: assets/polbadge.png
  features:
    - navigation.footer
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: blue
      accent: blue grey
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: blue grey

repo_url: https://github.com/Code4Creations/ECML

nav:
  - index.md
  - howto.md
  - customs.md
  - missionExample.md

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details

extra:
  social:
    - icon: simple/github
      link: https://github.com/Code4Creations/ECML

copyright: Copyright &copy; 2026 Code4Creations